				/* The switch - the box around the slider */
		.switch {
		  position: relative;
		  display: inline-block;
		  width: 60px;
		  height: 34px;
			float:right;
		}

		/* Hide default HTML checkbox */
		.switch input {
		  opacity: 0;
		  width: 0;
		  height: 0;
		}

		/* The slider */
		.slider {
			padding: 10px;
		  position: absolute;
		  cursor: pointer;
		  top: 0;
		  left: 0;
		  right: 0;
		  bottom: 0;
		  background-color: #ccc;
		  -webkit-transition: .4s;
		  transition: .4s;
		}

		.slider:before {
		  position: absolute;
		  content: "";
		  height: 26px;
		  width: 26px;
		  left: 4px;
		  bottom: 4px;
		  background-color: white;
		  -webkit-transition: .4s;
		  transition: .4s;
		}

		input:checked + .slider {
		  background-color: #7a5d4a;
		}

		input:focus + .slider {
		  box-shadow: 0 0 1px #7a5d4a;
		}

		input:checked + .slider:before {
		  -webkit-transform: translateX(26px);
		  -ms-transform: translateX(26px);
		  transform: translateX(26px);
		}

		/* Rounded sliders */
		.slider.round {
		  border-radius: 34px;
		}

		.slider.round:before {
		  border-radius: 50%;
		}

  // Pixel art frames — head at top, neck at bottom (cat peeks up from screen edge)

    [K,T,W,W,T,T,T,T,T,T,T,T,W,W,T,K],  // eyes open bottom
    [K,T,T,T,T,T,T,P,T,T,T,T,T,T,T,K],  // nose
    [K,T,T,T,T,T,P,_,P,T,T,T,T,T,T,K],  // mouth (smile)

    [K,T,T,T,T,T,T,T,T,T,T,T,T,T,T,K],  // neck
    [_,K,K,K,K,K,K,K,K,K,K,K,K,K,K,_],  // neck bottom
    [_,_,K,K,K,K,K,K,K,K,K,K,K,K,_,_],  // body top edge
  ];

  const frameClosed = frameOpen.map((row, y) => {
    if (y === 4) return [K,T,T,T,T,T,T,T,T,T,T,T,T,T,T,K];
    if (y === 5) return [K,T,K,K,T,T,T,T,T,T,T,T,K,K,T,K]; // closed eyes
    if (y === 6) return [K,T,T,T,T,T,T,T,T,T,T,T,T,T,T,K];
    return row;

  const frameSide = frameOpen.map((row, y) => {
    if (y === 5) return [K,T,T,W,T,T,T,T,T,T,T,W,T,T,T,K]; // look-side pupils
    return row;
  });

  // Space suit cat (16 cols × 23 rows, drawn at SC=6px per pixel)
  const spaceCat = [
    // --- helmet ---
    [_,_,_,K,K,K,K,K,K,K,K,K,K,_,_,_],  //  0: helmet top arc
    [_,_,K,V,V,V,V,V,V,V,V,V,V,K,_,_],  //  1: helmet rim top
    [_,K,V,B,B,B,B,B,B,B,B,B,B,V,K,_],  //  2: helmet glass
    [K,V,B,B,K,T,P,K,K,P,T,K,B,B,V,K],  //  3: ears inside helmet

    [K,V,B,T,W,K,T,T,T,T,W,K,T,B,V,K],  //  7: pupils
    [K,V,B,T,W,W,T,T,T,T,W,W,T,B,V,K],  //  8: eyes bottom

    [_,_,K,C,C,C,C,C,C,C,C,C,C,K,_,_],  // 14: suit top (narrow — oval shape)

  ];

  function draw(ctx, frame, scale) {
    ctx.clearRect(0, 0, frame[0].length * scale, frame.length * scale);
    frame.forEach((row, y) => {
      row.forEach((color, x) => {
        if (color) {
          ctx.fillStyle = color;
          ctx.fillRect(x * scale, y * scale, scale, scale);
        }
      });
    });
  }

  function showCat() {
    if (active) return;
    active = true;

    const hideY = ROWS * SCALE;       // 104px — fully below edge
    const peekY = 16;                 // 16px below edge — shows 88px of cat

    // Inject wiggle keyframes once
    if (!document.getElementById('catEggStyle')) {
      const s = document.createElement('style');
      s.id = 'catEggStyle';
      s.textContent = `
        @keyframes catWiggle {
          0%,100% { transform: translateX(-50%) translateY(${peekY}px) rotate(0deg); }
          20%      { transform: translateX(calc(-50% - 6px)) translateY(${peekY}px) rotate(-4deg); }
          40%      { transform: translateX(calc(-50% + 6px)) translateY(${peekY}px) rotate(4deg); }
          60%      { transform: translateX(calc(-50% - 4px)) translateY(${peekY}px) rotate(-2deg); }
          80%      { transform: translateX(calc(-50% + 4px)) translateY(${peekY}px) rotate(2deg); }
        }`;
      document.head.appendChild(s);
    }

    const el = document.createElement('div');
    // Use transform instead of bottom so body overflow:hidden can't clip us
    el.style.cssText = `
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%) translateY(${hideY}px);
      z-index:99999;
      transition:transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none;
    `;

    const canvas = document.createElement('canvas');
    canvas.width = COLS * SCALE;
    canvas.height = ROWS * SCALE;
    canvas.style.cssText = 'image-rendering:pixelated;image-rendering:crisp-edges;display:block;';
    el.appendChild(canvas);
    document.body.appendChild(el);

    const ctx = canvas.getContext('2d');
    draw(ctx, frameOpen, SCALE);

    // Slide up — peek head over bottom edge
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translateX(-50%) translateY(${peekY}px)`;
    }));

    // Animation sequence after peek-in
    const seq = [
      [600,  frameClosed],  // blink
      [800,  frameOpen],
      [1100, frameSide],    // glance side
      [1400, frameOpen],
      [1700, frameClosed],  // blink
      [1900, frameOpen],
      [2200, frameClosed],  // blink
      [2400, frameOpen],
    ];
    seq.forEach(([t, frame]) => setTimeout(() => draw(ctx, frame, SCALE), t));

    // Wiggle after settling
    setTimeout(() => {
      el.style.transition = 'none';
      el.style.animation = 'catWiggle 0.5s ease-in-out';
    }, 1000);

    // Slide back down
    setTimeout(() => {
      el.style.animation = '';
      el.style.transition = 'transform 0.55s ease-in';
      el.style.transform = `translateX(-50%) translateY(${hideY + 10}px)`;
      setTimeout(() => { el.remove(); active = false; }, 650);
    }, 3400);
  }

  // 1337 easter egg — cat with matrix sunglasses + laptop
  const hackCat = [
    [_,_,K,K,_,_,_,_,_,_,_,_,K,K,_,_],           //  0: ears
    [_,K,T,P,K,_,_,_,_,_,_,K,P,T,K,_],           //  1: ear inner
    [K,T,T,T,T,K,_,_,_,_,K,T,T,T,T,K],           //  2: head top
    [K,T,T,T,T,T,K,K,K,K,T,T,T,T,T,K],           //  3: face
    [K,T,T,DG,DG,DG,DG,K,K,DG,DG,DG,DG,T,T,K],  //  4: sunglasses top
    [K,T,T,DG,RG,DG,DG,K,K,DG,DG,RG,DG,T,T,K],  //  5: sunglasses + reflections
    [K,T,T,DG,DG,DG,DG,K,K,DG,DG,DG,DG,T,T,K],  //  6: sunglasses bottom
    [K,T,T,T,T,T,T,P,T,T,T,T,T,T,T,K],           //  7: nose
    [K,T,T,T,T,T,P,_,P,T,T,T,T,T,T,K],           //  8: smirk
    [K,T,T,T,T,T,T,_,T,T,T,T,T,T,T,K],           //  9: chin
    [_,K,K,K,K,K,K,K,K,K,K,K,K,K,K,_],           // 10: neck
    [_,_,_,K,K,K,K,K,K,K,K,K,K,_,_,_],           // 11: screen top bezel
    [_,_,_,K,MG,MG,MG,MG,MG,MG,MG,MG,K,_,_,_],  // 12: screen (green)
    [_,_,_,K,MG,K,K,MG,MG,K,K,MG,K,_,_,_],      // 13: code line
    [_,_,_,K,MG,K,MG,MG,MG,MG,K,MG,K,_,_,_],    // 14: code line
    [_,_,_,K,MG,MG,MG,K,K,MG,MG,MG,K,_,_,_],    // 15: code line
    [_,_,_,K,K,K,K,K,K,K,K,K,K,_,_,_],           // 16: screen bottom bezel
    [_,K,K,K,K,K,K,K,K,K,K,K,K,K,K,_],           // 17: keyboard body
    [_,K,LK,LK,LK,LK,LK,LK,LK,LK,LK,LK,LK,LK,K,_],  // 18: keys
  ];

  function show1337() {
    if (leet) return;
    leet = true;

    const HS = 8, HR = hackCat.length;

    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed; top:0; left:0; width:100%; height:100%;
      z-index:99999; background:#000;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      opacity:0; transition:opacity 0.4s; cursor:pointer;
    `;

    const rain = document.createElement('canvas');
    rain.width = window.innerWidth;
    rain.height = window.innerHeight;
    rain.style.cssText = 'position:absolute; top:0; left:0;';

    const catCv = document.createElement('canvas');
    catCv.width = COLS * HS;
    catCv.height = HR * HS;
    catCv.style.cssText = `
      image-rendering:pixelated; image-rendering:crisp-edges;
      display:block; position:relative; z-index:1;
      opacity:0; transition:opacity 0.4s;
      box-shadow:0 0 24px #00ff41, 0 0 48px #003300;
    `;

    const txt = document.createElement('div');
    txt.textContent = '[ ACCESS GRANTED ]';
    txt.style.cssText = `
      color:#00ff41; font:bold 15px monospace; letter-spacing:5px;
      text-shadow:0 0 8px #00ff41; position:relative; z-index:1;
      margin-top:12px; opacity:0; transition:opacity 0.4s;
    `;

    const sub = document.createElement('div');
    sub.textContent = '< 1337 5P34K 3N4BL3D >';
    sub.style.cssText = `
      color:#007700; font:11px monospace; letter-spacing:2px;
      position:relative; z-index:1; margin-top:5px;
      opacity:0; transition:opacity 0.4s;
    `;

    overlay.append(rain, catCv, txt, sub);
    document.body.appendChild(overlay);
    draw(catCv.getContext('2d'), hackCat, HS);

    // Matrix rain
    const rctx = rain.getContext('2d');
    const rchars = 'アイウエオカキクケコサシスセソ0123456789ABCDEF<>/|{}[]!=';
    const fsz = 13, rcols = Math.floor(rain.width / fsz);
    const drops = Array.from({length: rcols}, () => Math.floor(Math.random() * -40));
    let rafId;
    (function rainStep() {
      rctx.fillStyle = 'rgba(0,0,0,0.05)';
      rctx.fillRect(0, 0, rain.width, rain.height);
      rctx.font = `${fsz}px monospace`;
      drops.forEach((y, i) => {
        rctx.fillStyle = y % 3 === 0 ? '#aaffaa' : '#00ff41';
        rctx.fillText(rchars[Math.floor(Math.random() * rchars.length)], i * fsz, y * fsz);
        if (y * fsz > rain.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
      rafId = requestAnimationFrame(rainStep);
    })();

    requestAnimationFrame(() => requestAnimationFrame(() => { overlay.style.opacity = '1'; }));
    setTimeout(() => { catCv.style.opacity = '1'; txt.style.opacity = '1'; sub.style.opacity = '1'; }, 500);

    function dismiss() {
      cancelAnimationFrame(rafId);
      overlay.style.opacity = '0';
      setTimeout(() => { overlay.remove(); leet = false; }, 500);
    }
    overlay.addEventListener('click', dismiss);
    setTimeout(dismiss, 4500);
  }

  document.addEventListener('keydown', e => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : null;
    if (!k) return;
    buf.push(k);
    if (buf.length > SPACE_MEOW.length) buf.shift();
    const s = buf.join('');
    if (s.endsWith(SPACE_MEOW)) { showSpaceCat(); buf = []; }
    else if (s.endsWith(MEOW)) { showCat(); buf = []; }
    else if (s.endsWith('1337')) { show1337(); buf = []; }
  });

  console.log('%c🐱 "meow" · 🚀 "spacemeow" · 💻 "1337"', 'color:#00ff41;font-size:13px;font-family:monospace');
})();
</script>
