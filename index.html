				/* The switch - the box around the slider */
		.switch {
		  position: relative;
		  display: inline-block;
		  width: 60px;
		  height: 34px;
			float:right;
		}

		/* Hide default HTML checkbox */
		.switch input {
		  opacity: 0;
		  width: 0;
		  height: 0;
		}

		/* The slider */
		.slider {
			padding: 10px;
		  position: absolute;
		  cursor: pointer;
		  top: 0;
		  left: 0;
		  right: 0;
		  bottom: 0;
		  background-color: #ccc;
		  -webkit-transition: .4s;
		  transition: .4s;
		}

		.slider:before {
		  position: absolute;
		  content: "";
		  height: 26px;
		  width: 26px;
		  left: 4px;
		  bottom: 4px;
		  background-color: white;
		  -webkit-transition: .4s;
		  transition: .4s;
		}

		input:checked + .slider {
		  background-color: #7a5d4a;
		}

		input:focus + .slider {
		  box-shadow: 0 0 1px #7a5d4a;
		}

		input:checked + .slider:before {
		  -webkit-transform: translateX(26px);
		  -ms-transform: translateX(26px);
		  transform: translateX(26px);
		}

		/* Rounded sliders */
		.slider.round {
		  border-radius: 34px;
		}

		.slider.round:before {
		  border-radius: 50%;
		}

// Cat Easter Egg — type "meow" anywhere to trigger
(function() {
  const TRIGGER = ['m','e','o','w'];
  let buf = [];
  let active = false;

  const SCALE = 8, COLS = 16, ROWS = 13;
  const _ = null, K = '#1a1a1a', T = '#d4813a', P = '#f4a2b5', W = '#ffffff';

  // Pixel art frames — head at top, neck at bottom (cat peeks up from screen edge)
  const frameOpen = [
    [_,_,K,K,_,_,_,_,_,_,_,_,K,K,_,_],  // ears
    [_,K,T,P,K,_,_,_,_,_,_,K,P,T,K,_],  // ear inner
    [K,T,T,T,T,K,_,_,_,_,K,T,T,T,T,K],  // top head
    [K,T,T,T,T,T,K,K,K,K,T,T,T,T,T,K],  // face
    [K,T,W,W,T,T,T,T,T,T,T,T,W,W,T,K],  // eyes open top
    [K,T,W,K,T,T,T,T,T,T,T,T,W,K,T,K],  // pupils
    [K,T,W,W,T,T,T,T,T,T,T,T,W,W,T,K],  // eyes open bottom
    [K,T,T,T,T,T,T,P,T,T,T,T,T,T,T,K],  // nose
    [K,T,T,T,T,T,P,_,P,T,T,T,T,T,T,K],  // mouth (smile)
    [K,T,T,T,T,T,T,_,T,T,T,T,T,T,T,K],  // chin
    [K,T,T,T,T,T,T,T,T,T,T,T,T,T,T,K],  // neck
    [_,K,K,K,K,K,K,K,K,K,K,K,K,K,K,_],  // neck bottom
    [_,_,K,K,K,K,K,K,K,K,K,K,K,K,_,_],  // body top edge
  ];

  const frameClosed = frameOpen.map((row, y) => {
    if (y === 4) return [K,T,T,T,T,T,T,T,T,T,T,T,T,T,T,K];
    if (y === 5) return [K,T,K,K,T,T,T,T,T,T,T,T,K,K,T,K]; // closed eyes
    if (y === 6) return [K,T,T,T,T,T,T,T,T,T,T,T,T,T,T,K];
    return row;
  });

  const frameSide = frameOpen.map((row, y) => {
    if (y === 5) return [K,T,T,W,T,T,T,T,T,T,T,W,T,T,T,K]; // look-side pupils
    return row;
  });

  function draw(ctx, frame) {
    ctx.clearRect(0, 0, COLS * SCALE, ROWS * SCALE);
    frame.forEach((row, y) => {
      row.forEach((color, x) => {
        if (color) {
          ctx.fillStyle = color;
          ctx.fillRect(x * SCALE, y * SCALE, SCALE, SCALE);
        }
      });
    });
  }

  function showCat() {
    if (active) return;
    active = true;

    const hideY = ROWS * SCALE;       // 104px — fully below edge
    const peekY = 16;                 // 16px below edge — shows 88px of cat

    // Inject wiggle keyframes once
    if (!document.getElementById('catEggStyle')) {
      const s = document.createElement('style');
      s.id = 'catEggStyle';
      s.textContent = `
        @keyframes catWiggle {
          0%,100% { transform: translateX(-50%) translateY(${peekY}px) rotate(0deg); }
          20%      { transform: translateX(calc(-50% - 6px)) translateY(${peekY}px) rotate(-4deg); }
          40%      { transform: translateX(calc(-50% + 6px)) translateY(${peekY}px) rotate(4deg); }
          60%      { transform: translateX(calc(-50% - 4px)) translateY(${peekY}px) rotate(-2deg); }
          80%      { transform: translateX(calc(-50% + 4px)) translateY(${peekY}px) rotate(2deg); }
        }`;
      document.head.appendChild(s);
    }

    const el = document.createElement('div');
    // Use transform instead of bottom so body overflow:hidden can't clip us
    el.style.cssText = `
      position:fixed;
      bottom:0;
      left:50%;
      transform:translateX(-50%) translateY(${hideY}px);
      z-index:99999;
      transition:transform 0.7s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none;
    `;

    const canvas = document.createElement('canvas');
    canvas.width = COLS * SCALE;
    canvas.height = ROWS * SCALE;
    canvas.style.cssText = 'image-rendering:pixelated;image-rendering:crisp-edges;display:block;';
    el.appendChild(canvas);
    document.body.appendChild(el);

    const ctx = canvas.getContext('2d');
    draw(ctx, frameOpen);

    // Slide up — peek head over bottom edge
    requestAnimationFrame(() => requestAnimationFrame(() => {
      el.style.transform = `translateX(-50%) translateY(${peekY}px)`;
    }));

    // Animation sequence after peek-in
    const seq = [
      [600,  frameClosed],  // blink
      [800,  frameOpen],
      [1100, frameSide],    // glance side
      [1400, frameOpen],
      [1700, frameClosed],  // blink
      [1900, frameOpen],
      [2200, frameClosed],  // blink
      [2400, frameOpen],
    ];
    seq.forEach(([t, frame]) => setTimeout(() => draw(ctx, frame), t));

    // Wiggle after settling
    setTimeout(() => {
      el.style.transition = 'none';
      el.style.animation = 'catWiggle 0.5s ease-in-out';
    }, 1000);

    // Slide back down
    setTimeout(() => {
      el.style.animation = '';
      el.style.transition = 'transform 0.55s ease-in';
      el.style.transform = `translateX(-50%) translateY(${hideY + 10}px)`;
      setTimeout(() => { el.remove(); active = false; }, 650);
    }, 3400);
  }

  document.addEventListener('keydown', e => {
    const k = e.key.length === 1 ? e.key.toLowerCase() : null;
    if (!k) return;
    buf.push(k);
    if (buf.length > TRIGGER.length) buf.shift();
    if (buf.join('') === TRIGGER.join('')) { showCat(); buf = []; }
  });

  console.log('%c🐱 psst... type "meow" for a surprise', 'color:#d4813a;font-size:13px;font-family:courier');
})();
</script>
